services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicare-postgres
    restart: always
    environment:
      POSTGRES_DB: clinicare
      POSTGRES_USER: clinicare
      POSTGRES_PASSWORD: clinicare
    ports:
      - "5435:5432"
    volumes:
      - clinicare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicare -d clinicare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinicare-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinicare
      SPRING_DATASOURCE_USERNAME: clinicare
      SPRING_DATASOURCE_PASSWORD: clinicare
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-change-this-local-jwt-secret-with-at-least-32-characters}
      SECURITY_JWT_EXPIRATION_MINUTES: ${SECURITY_JWT_EXPIRATION_MINUTES:-120}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
      CLINICARE_BOOTSTRAP_ADMIN_ENABLED: ${CLINICARE_BOOTSTRAP_ADMIN_ENABLED:-true}
      CLINICARE_BOOTSTRAP_ADMIN_NAME: ${CLINICARE_BOOTSTRAP_ADMIN_NAME:-Administrador}
      CLINICARE_BOOTSTRAP_ADMIN_EMAIL: ${CLINICARE_BOOTSTRAP_ADMIN_EMAIL:-admin@clinicare.local}
      CLINICARE_BOOTSTRAP_ADMIN_PASSWORD: ${CLINICARE_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinicare-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  clinicare-postgres-data:
