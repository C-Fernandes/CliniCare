services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicare-postgres
    restart: always
    environment:
      POSTGRES_DB: clinicare
      POSTGRES_USER: clinicare
      POSTGRES_PASSWORD: clinicare
    ports:
      - "5435:5432"
    volumes:
      - clinicare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicare -d clinicare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinicare-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinicare
      SPRING_DATASOURCE_USERNAME: clinicare
      SPRING_DATASOURCE_PASSWORD: clinicare
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-change-this-local-jwt-secret-with-at-least-32-characters}
      SECURITY_JWT_EXPIRATION_MINUTES: ${SECURITY_JWT_EXPIRATION_MINUTES:-120}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
      CLINICARE_BOOTSTRAP_ADMIN_ENABLED: ${CLINICARE_BOOTSTRAP_ADMIN_ENABLED:-true}
      CLINICARE_BOOTSTRAP_ADMIN_NAME: ${CLINICARE_BOOTSTRAP_ADMIN_NAME:-Administrador}
      CLINICARE_BOOTSTRAP_ADMIN_EMAIL: ${CLINICARE_BOOTSTRAP_ADMIN_EMAIL:-admin@clinicare.local}
      CLINICARE_BOOTSTRAP_ADMIN_PASSWORD: ${CLINICARE_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_STARTTLS_ENABLE: ${SPRING_MAIL_STARTTLS_ENABLE:-false}
      CLINICARE_MAIL_FROM: ${CLINICARE_MAIL_FROM:-no-reply@clinicare.local}
      CLINICARE_APP_BASE_URL: ${CLINICARE_APP_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: clinicare-mailpit
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinicare-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  clinicare-postgres-data:
